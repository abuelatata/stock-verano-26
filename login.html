<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login · Abuela Tata</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:#f5efe6;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.box{
  background:#fff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  width:320px;
}
input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2f7f75;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Área Profesional</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Contraseña">

  <button type="button" onclick="login()">Entrar</button>
</div>

<script>
const SUPABASE_URL = "https://dscuemveajmlgzhrpopj.supabase.co";
const SUPABASE_KEY = "sb_publishable_U477X85MkfoGqVOov3I5vw_WUZoCSS7";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

async function login(){
  try{
    console.log("LOGIN PULSADO");

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if(!email || !password){
      alert("Introduce email y contraseña");
      return;
    }

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    console.log("RESPUESTA LOGIN:", data, error);

    if(error){
      alert(error.message);
      return;
    }

    // pequeña pausa para asegurar sesión
    setTimeout(()=>{
      window.location.href = "./index.html";
    }, 300);

  }catch(err){
    console.error("ERROR LOGIN:", err);
    alert("Error en el login");
  }
}
</script>

</body>
</html>
